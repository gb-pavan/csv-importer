services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/upload}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
